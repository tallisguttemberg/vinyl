server:
  port: 8082

spring:
  application:
    name: bar-service

  datasource:
    # Database configuration with environment variables for Docker support
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reservations}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: bar
        format_sql: true

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

# JWT Configuration
jwt:
  secret: "mySuperSecretKeyForJwtSigningThatIsVeryLongAndSecureEnoughForThisApplication"
  expiration: 86400000

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
