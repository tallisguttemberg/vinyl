services:
  db:
    image: postgres:15-alpine
    container_name: football_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reservations
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./seeds.sql:/docker-entrypoint-initdb.d/2-seeds.sql
      - ./bar-schema.sql:/docker-entrypoint-initdb.d/3-bar-schema.sql
    restart: always

  backend:
    image: gradle:8.5-jdk17-alpine
    container_name: football_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/reservations
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    command: gradle bootRun

  bar-service:
    image: gradle:8.5-jdk17-alpine
    container_name: bar_service
    working_dir: /app
    volumes:
      - ./bar-service:/app
      - ./backend/gradle:/app/gradle # Share wrapper cache if possible, or just use wrapper from bar-service
      # Actually bar-service has its own gradle folder now.
    ports:
      - "8082:8082"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/reservations
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      JWT_SECRET: mySuperSecretKeyForJwtSigningThatIsVeryLongAndSecureEnoughForThisApplication
    command: gradle bootRun
  frontend:
    image: node:18-alpine
    container_name: football_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
